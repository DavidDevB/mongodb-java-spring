<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retrait — BankApp</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%);
        border-bottom: 1px solid #2d3748;
        padding: 1.2rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .logo {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
      }
      header h1 {
        font-size: 1.1rem;
        font-weight: 700;
      }
      .breadcrumb {
        font-size: 0.8rem;
        color: #718096;
      }
      .breadcrumb a {
        color: #fdba74;
        text-decoration: none;
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2.5rem 1rem;
      }

      .form-card {
        background: #1a1f2e;
        border: 1px solid #2d3748;
        border-top: 3px solid #fc8181;
        border-radius: 16px;
        padding: 2.5rem;
        width: 100%;
        max-width: 480px;
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.5rem;
      }
      .card-header .icon {
        width: 44px;
        height: 44px;
        background: rgba(229, 62, 62, 0.15);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
      }
      .form-card h2 {
        font-size: 1.3rem;
        font-weight: 600;
      }
      .subtitle {
        font-size: 0.85rem;
        color: #718096;
        margin-bottom: 2rem;
      }

      .form-group {
        margin-bottom: 1.3rem;
      }

      label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: #a0aec0;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.45rem;
      }
      label .required {
        color: #fc8181;
        margin-left: 2px;
      }
      label .hint {
        font-size: 0.7rem;
        color: #4a5568;
        font-weight: 400;
        text-transform: none;
        letter-spacing: 0;
        margin-left: 0.4rem;
      }

      .input-prefix-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }
      .input-prefix {
        position: absolute;
        left: 1rem;
        font-size: 1rem;
        color: #fc8181;
        font-weight: 600;
        pointer-events: none;
        user-select: none;
      }

      input[type="text"],
      input[type="date"] {
        width: 100%;
        padding: 0.65rem 1rem;
        background: #0f1117;
        border: 1px solid #2d3748;
        border-radius: 8px;
        color: #e2e8f0;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      input.with-prefix {
        padding-left: 2.2rem;
      }
      input::placeholder {
        color: #4a5568;
      }
      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0.6);
        cursor: pointer;
      }
      input:focus {
        border-color: #fc8181;
        box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.2);
      }
      input.is-error {
        border-color: #e53e3e;
      }
      input.is-error:focus {
        box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.25);
      }

      .error-msg {
        font-size: 0.78rem;
        color: #fc8181;
        margin-top: 0.35rem;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .account-preview {
        background: #0f1117;
        border: 1px solid #2d3748;
        border-left: 3px solid #fc8181;
        border-radius: 8px;
        padding: 0.85rem 1.1rem;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.88rem;
      }
      .account-preview .acc-number {
        font-family: "Courier New", monospace;
        color: #e2e8f0;
        font-weight: 600;
      }
      .account-preview .acc-balance {
        color: #86efac;
        font-weight: 600;
      }
      .account-preview .acc-balance.negative {
        color: #fc8181;
      }

      .divider {
        border: none;
        border-top: 1px solid #2d3748;
        margin: 1.75rem 0;
      }

      .form-actions {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
      }

      .btn {
        padding: 0.6rem 1.3rem;
        border-radius: 8px;
        border: none;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        transition: opacity 0.15s, transform 0.1s;
      }
      .btn:hover {
        opacity: 0.85;
        transform: scale(1.02);
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-primary {
        background: #c53030;
        color: #fff;
      }
      .btn-ghost {
        background: #2d0a0a;
        color: #fc8181;
      }

      .alert-success {
        background: #0b2217;
        border: 1px solid #1e6640;
        border-radius: 10px;
        padding: 0.85rem 1rem;
        font-size: 0.88rem;
        color: #86efac;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .alert-error {
        background: #2a0d0d;
        border: 1px solid #6b2727;
        border-radius: 10px;
        padding: 0.85rem 1rem;
        font-size: 0.88rem;
        color: #fc8181;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      footer {
        text-align: center;
        padding: 1rem;
        font-size: 0.78rem;
        color: #4a5568;
        border-top: 1px solid #2d3748;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="logo">&#127968;</div>
        <h1>BankApp</h1>
      </div>
      <nav class="breadcrumb">
        <a th:href="@{/}" href="/">Accueil</a> /
        <a th:href="@{/operations}" href="/operations">Op&eacute;rations</a> /
        Retrait
      </nav>
    </header>

    <main>
      <div class="form-card">
        <div class="card-header">
          <div class="icon">&#8657;</div>
          <h2>Retrait</h2>
        </div>
        <p class="subtitle">D&eacute;bitez un compte bancaire d&apos;un montant donn&eacute;.</p>

        <div class="alert-success" th:if="${successMessage}">
          &#10003; <span th:text="${successMessage}">Retrait effectu&eacute; avec succ&egrave;s.</span>
        </div>
        <div class="alert-error" th:if="${errorMessage}">
          &#9888; <span th:text="${errorMessage}">Une erreur est survenue.</span>
        </div>

        <!-- Aperçu du compte si pré-sélectionné -->
        <div class="account-preview" th:if="${currentAccount != null}">
          <span class="acc-number" th:text="${currentAccount.accountNumber}">FR7600000000000</span>
          <span class="acc-balance"
            th:classappend="${#strings.startsWith(currentAccount.balance, '-')} ? ' negative'">
            &#8364; <span th:text="${currentAccount.balance}">0.00</span>
          </span>
        </div>

        <form th:action="@{/operations/withdraw}" th:object="${operation}" method="post">
<input type="hidden" th:field="*{type}" value="RETRAIT" />

          <div class="form-group">
            <label for="accountId">N&#176; de compte <span class="required">*</span></label>
            <input
              type="text"
              id="accountId"
              th:field="*{accountId}"
              placeholder="FR7600000000000"
              th:classappend="${#fields.hasErrors('accountId')} ? 'is-error'"
              autocomplete="off"
            />
            <p class="error-msg" th:if="${#fields.hasErrors('accountId')}">
              &#9888; <span th:errors="*{accountId}"></span>
            </p>
          </div>

          <div class="form-group">
            <label for="amount">
              Montant <span class="required">*</span>
              <span class="hint">(en euros)</span>
            </label>
            <div class="input-prefix-wrapper">
              <span class="input-prefix">&#8364;</span>
              <input
                type="text"
                id="amount"
                class="with-prefix"
                th:field="*{amount}"
                placeholder="0.00"
                th:classappend="${#fields.hasErrors('amount')} ? 'is-error'"
                autocomplete="off"
              />
            </div>
            <p class="error-msg" th:if="${#fields.hasErrors('amount')}">
              &#9888; <span th:errors="*{amount}"></span>
            </p>
          </div>

          <div class="form-group">
            <label for="date">Date de l&apos;op&eacute;ration <span class="required">*</span></label>
            <input
              type="date"
              id="date"
              name="date"
              th:value="${operation.date}"
            />
          </div>

          <hr class="divider" />

          <div class="form-actions">
            <a th:href="@{/operations}" href="/operations" class="btn btn-ghost">Annuler</a>
            <button type="submit" class="btn btn-primary">&#8657; Effectuer le retrait</button>
          </div>
        </form>
      </div>
    </main>

    <footer>&copy; 2026 BankApp &mdash; Spring Boot &middot; MongoDB &middot; Thymeleaf</footer>
  </body>
</html>
