<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nouveau client — BankApp</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%);
        border-bottom: 1px solid #2d3748;
        padding: 1.2rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .logo {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
      }
      header h1 {
        font-size: 1.1rem;
        font-weight: 700;
      }
      .breadcrumb {
        font-size: 0.8rem;
        color: #718096;
      }
      .breadcrumb a {
        color: #a5b4fc;
        text-decoration: none;
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2.5rem 1rem;
      }

      .form-card {
        background: #1a1f2e;
        border: 1px solid #2d3748;
        border-top: 3px solid #667eea;
        border-radius: 16px;
        padding: 2.5rem;
        width: 100%;
        max-width: 520px;
      }

      .form-card .card-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.5rem;
      }
      .form-card .card-header .icon {
        width: 44px;
        height: 44px;
        background: rgba(102, 126, 234, 0.15);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
      }
      .form-card h2 {
        font-size: 1.3rem;
        font-weight: 600;
      }
      .form-card .subtitle {
        font-size: 0.85rem;
        color: #718096;
        margin-bottom: 2rem;
        padding-left: 0;
      }

      .form-group {
        margin-bottom: 1.3rem;
      }

      label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: #a0aec0;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.45rem;
      }
      label .required {
        color: #fc8181;
        margin-left: 2px;
      }

      input[type="text"],
      input[type="tel"] {
        width: 100%;
        padding: 0.65rem 1rem;
        background: #0f1117;
        border: 1px solid #2d3748;
        border-radius: 8px;
        color: #e2e8f0;
        font-size: 0.95rem;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      input::placeholder {
        color: #4a5568;
      }
      input:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
      }
      input.is-error {
        border-color: #e53e3e;
      }
      input.is-error:focus {
        box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.2);
      }

      .error-msg {
        font-size: 0.78rem;
        color: #fc8181;
        margin-top: 0.35rem;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .divider {
        border: none;
        border-top: 1px solid #2d3748;
        margin: 1.75rem 0;
      }

      .form-actions {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
      }

      .btn {
        padding: 0.6rem 1.3rem;
        border-radius: 8px;
        border: none;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }
      .btn:hover {
        opacity: 0.85;
        transform: scale(1.02);
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-primary {
        background: #667eea;
        color: #fff;
      }
      .btn-ghost {
        background: rgba(102, 126, 234, 0.15);
        color: #a5b4fc;
      }

      /* Alerte succès */
      .alert-success {
        background: rgba(72, 187, 120, 0.12);
        border: 1px solid rgba(72, 187, 120, 0.3);
        border-radius: 10px;
        padding: 0.85rem 1rem;
        font-size: 0.88rem;
        color: #86efac;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      footer {
        text-align: center;
        padding: 1rem;
        font-size: 0.78rem;
        color: #4a5568;
        border-top: 1px solid #2d3748;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="logo">🏦</div>
        <h1>BankApp</h1>
      </div>
      <nav class="breadcrumb">
        <a th:href="@{/}" href="/">Accueil</a> / <a th:href="@{/clients}" href="/clients">Clients</a> / Nouveau
      </nav>
    </header>

    <main>
      <div class="form-card">
        <div class="card-header">
          <div class="icon">👤</div>
          <h2>Nouveau client</h2>
        </div>
        <p class="subtitle">Remplissez les informations pour créer un nouveau client.</p>

        <!-- Message de succès (affiché après création réussie) -->
        <div class="alert-success" th:if="${successMessage}">
          ✅ <span th:text="${successMessage}">Client créé avec succès.</span>
        </div>

        <form th:action="@{/clients/new}" th:object="${client}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <div class="form-row">
            <div class="form-group">
              <label for="lastname">Nom <span class="required">*</span></label>
              <input
                type="text"
                id="lastname"
                th:field="*{lastname}"
                placeholder="Dupont"
                th:classappend="${#fields.hasErrors('lastname')} ? 'is-error'"
                autocomplete="family-name"
              />
              <p class="error-msg" th:if="${#fields.hasErrors('lastname')}">⚠ <span th:errors="*{lastname}"></span></p>
            </div>

            <div class="form-group">
              <label for="firstname">Prénom <span class="required">*</span></label>
              <input
                type="text"
                id="firstname"
                th:field="*{firstname}"
                placeholder="Jean"
                th:classappend="${#fields.hasErrors('firstname')} ? 'is-error'"
                autocomplete="given-name"
              />
              <p class="error-msg" th:if="${#fields.hasErrors('firstname')}">
                ⚠ <span th:errors="*{firstname}"></span>
              </p>
            </div>
          </div>

          <div class="form-group">
            <label for="adress">Adresse</label>
            <input
              type="text"
              id="adress"
              th:field="*{adress}"
              placeholder="12 rue de la Paix, 75001 Paris"
              autocomplete="street-address"
            />
          </div>

          <div class="form-group">
            <label for="phoneNumber">Téléphone</label>
            <input
              type="tel"
              id="phoneNumber"
              th:field="*{phoneNumber}"
              placeholder="+33 6 00 00 00 00"
              autocomplete="tel"
            />
          </div>

          <hr class="divider" />

          <div class="form-actions">
            <a th:href="@{/clients}" href="/clients" class="btn btn-ghost">Annuler</a>
            <button type="submit" class="btn btn-primary">✅ Créer le client</button>
          </div>
        </form>
      </div>
    </main>

    <footer>&copy; 2026 BankApp — Spring Boot · MongoDB · Thymeleaf</footer>
  </body>
</html>
